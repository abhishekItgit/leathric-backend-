spring:
  datasource:
    url: jdbc:mysql://database-1.c7cokmqwit9z.ap-south-1.rds.amazonaws.com:3306/leathric_db
   # username: ${DB_USERNAME}
    username: admin
   # password: ${DB_PASSWORD}
    password: Zxcvbnm2026Zxcvbnm

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  jackson:
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8082

security:
  jwt:
    secret: change-me-to-a-very-long-secret-key-at-least-32-bytes
    expiration-ms: 86400000

logging:
  level:
    org.hibernate.SQL: warn

app:
  storage:
    max-file-size-bytes: 5242880
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://localhost
  aws:
    s3:
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}
      region: ${AWS_REGION:ap-south-1}
      bucket: ${AWS_S3_BUCKET:}
      product-image-prefix: ${AWS_S3_PRODUCT_PREFIX:products}
      presigned-url-expiration-seconds: ${AWS_S3_PRESIGNED_EXPIRATION_SECONDS:900}
      max-file-size-bytes: ${AWS_S3_MAX_FILE_SIZE_BYTES:5242880}
